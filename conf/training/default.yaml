# =============================================================================
# 默认训练配置
# =============================================================================

epochs: 100                    # 全局通信轮次
local_ep: 5                    # 本地训练轮次
local_bs: 128                  # 本地批次大小
lr: 0.001                      # 学习率
optimizer: sgd                 # sgd | adam
momentum: 0.5                  # SGD 动量

# DataLoader 数据加载
# 联邦学习场景下 num_workers 不宜过高（每轮多客户端频繁创建 DataLoader）
# CIFAR 等小图像数据集 2~4 即可；DomainNet 等大图像数据集可适当提高至 4~8
num_workers: 4                # DataLoader 子进程数
prefetch_factor: 2             # 每 worker 预取 batch 数（仅 num_workers>0 时生效）

# Optional suffix for output directory names.
experiment_note: ""            # 实验备注，默认为空

# 控制台日志配置
console_log:
  to_console: true             # 是否输出到终端
  to_file: true                # 是否写入 console.log

# =============================================================================
# 评估配置
# =============================================================================
evaluation:
  eval_freq: 1                 # 评估频率（每 N 轮评估一次）
  eval_at_last: true           # 最后一轮强制评估
  eval_start_epoch: 0          # 从第几轮开始评估（0=从头开始）
                                # 负数表示最后N轮，如 -10 表示仅最后10轮评估
                                # 配合 eval_freq 使用，可大幅加速训练
  # Client sampling for evaluation is controlled by federated.test_frac.

# =============================================================================
# 数据划分配置
# =============================================================================
data:
  val_ratio: 0.2               # 验证集比例（从训练集划分）

# =============================================================================
# 早停配置
# =============================================================================
early_stopping:
  enabled: false               # 是否启用早停
  patience: 20               # 无改善轮次阈值
  min_delta: 0.001             # 最小改善量
  monitor: 'val_acc_avg'       # 监控指标
  mode: 'max'                  # 'max' 表示越大越好（准确率），'min' 表示越小越好（损失）

# =============================================================================
# 指标配置
# =============================================================================
metrics:
  local_stats: true            # 本地统计指标 (std, p10, p50, p90)
  drift: true                  # 客户端漂移与全局更新指标
  fedsdg_gate: true            # FedSDG 门控指标 (lambda_mean, etc.)
  fedsdg_reg: true             # FedSDG 正则化损失指标

# =============================================================================
# 最佳模型保存配置
# =============================================================================
save_best_model: true          # 是否保存最佳模型（基于 val_acc_avg）
                                # 保存为 checkpoint_best.pt，用于最终测试评估
