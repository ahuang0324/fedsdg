# =============================================================================
# DomainNet 数据集配置
# =============================================================================
#
# DomainNet 数据集特点:
#   - 6 个域: clipart, infograph, painting, quickdraw, real, sketch
#   - 345 个类别
#   - 约 600,000 张图像
#
# 分区模式:
#   - domain_dirichlet: 域内 Dirichlet 分区 (推荐，保留域异构性)
#   - global_dirichlet: 全局 Dirichlet 分区 (忽略域信息)
#
# 使用方式:
#   python main.py dataset=domainnet
#   python main.py dataset=domainnet dataset.domains="['real','clipart']"
#   python main.py dataset=domainnet dataset.partition_mode=global_dirichlet
#
# =============================================================================

name: domainnet
num_classes: 345
num_channels: 3
image_size: 224                # ViT 需要 resize 到 224

# 域配置
# null = 使用全部 6 个域
# 或指定部分域: ['real', 'clipart', 'sketch']
domains: null

# 分区模式
# domain_dirichlet: 先按域分组，再在每个域内用 Dirichlet 分区 (推荐)
# global_dirichlet: 忽略域，全局 Dirichlet 分区
partition_mode: domain_dirichlet

# 每个域的客户端数量 (仅 domain_dirichlet 模式有效)
# null = 自动均分 (num_users / num_domains)
# 或手动指定: {clipart: 15, infograph: 15, painting: 17, quickdraw: 18, real: 18, sketch: 17}
clients_per_domain: null

# LMDB 加速模式
# true: 使用预处理的 LMDB 数据库 (需先运行 convert_domainnet_to_lmdb.py)
# false: 使用原始图像文件 (较慢，但无需预处理)
use_lmdb: false

# 离线数据配置 (不支持)
use_offline: false
offline_data_root: ./datasets/preprocessed
