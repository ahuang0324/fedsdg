# =============================================================================
# FedSA-LoRA - 选择性聚合低秩适应联邦学习算法配置
# =============================================================================
# 
# FedSA-LoRA (Federated Share-A Low-Rank Adaptation) 核心思想：
# - 使用标准单路 LoRA（A 和 B 矩阵都参与训练）
# - 聚合时仅上传 A 矩阵（学习通用知识）到服务器进行 FedAvg
# - B 矩阵（捕获客户端特有知识）保留在本地，不参与聚合
#
# 与标准 FedLoRA 的区别：
#   FedLoRA:    A 和 B 都聚合
#   FedSA-LoRA: 仅 A 聚合，B 本地保留
#
# 使用方式:
#   python main.py algorithm=fedsalora
#   python main.py algorithm=fedsalora algorithm.lora_r=16
#   python main.py algorithm=fedsalora federated.dirichlet_alpha=0.1
#
# 参考论文:
#   Guo et al., "Selective Aggregation for Low-Rank Adaptation
#   in Federated Learning", ICLR 2025
#
# =============================================================================

name: fedsalora

# =============================================================================
# LoRA 参数（标准单路 LoRA，A 和 B 都参与训练）
# =============================================================================

lora_r: 8                    # LoRA 秩 (4-16 典型值)
lora_alpha: 16               # LoRA 缩放因子 (通常为 2*r)
lora_train_mlp_head: true    # 始终为 true（Head 需要训练）

# =============================================================================
# 服务端聚合配置
# =============================================================================

# 聚合方法（仅聚合 lora_A + Head，原论文使用 FedAvg）
server_agg_method: fedavg    # fedavg (默认) | alignment

# 对齐度计算策略（仅当 server_agg_method=alignment）
alignment_strategy: loo_mean

# 权重转换方式（仅当 server_agg_method=alignment）
weight_transform: softmax
softmax_temperature: 0.3
lambda_smooth: 0.0

# =============================================================================
# 其他参数（保持与其他算法结构一致，部分无效）
# =============================================================================

# FedSDG 专用参数（FedSA-LoRA 中忽略）
lambda1: 0.0
lambda2: 0.0
gate_penalty_type: unilateral
lr_gate: 0.01
grad_clip: 0.0

# 优化器配置
# FedSA-LoRA 推荐使用 Adam
optimizer: adam

# Head 学习率（可与 Backbone 不同）
# - null: 使用主学习率 lr（默认，保持向后兼容）
# - 正数: 使用独立的 Head 学习率
lr_head: null
