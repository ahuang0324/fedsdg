# =============================================================================
# Ditto - 个性化联邦学习算法配置
# =============================================================================
# 
# Ditto 核心思想：
# - 每个客户端维护两个模型：全局模型 w 和个性化模型 v
# - 个性化模型通过正则化向全局模型靠拢
#
# 损失函数：
#   L(v) = L_task(v) + (λ/2) ||v - w||²
#
# 训练流程（每轮本地训练）:
#   Step 1: 在全局模型上训练（用于聚合）
#   Step 2: 在个性化模型上训练（带正则化）
#
# 使用方式:
#   python main.py algorithm=ditto
#   python main.py algorithm=ditto algorithm.lambda_ditto=0.5
#   python main.py algorithm=ditto algorithm.ditto_reg_target=local
#
# 参考论文:
#   Li et al., "Ditto: Fair and Robust Federated Learning 
#   Through Personalization", ICML 2021
#
# =============================================================================

name: ditto

# =============================================================================
# Ditto 特有参数
# =============================================================================

# 正则化系数 λ
lambda_ditto: 0.1            # 典型值: 0.1-1.0
                             # 较大值 → 个性化模型更接近全局
                             # 较小值 → 更强的个性化

# 正则化参考点
ditto_reg_target: server     # server: 使用 Server 下发的 w^t（原论文）
                             # local: 使用本地训练后的 w^{t+1}_local

# =============================================================================
# LoRA 参数（Ditto 使用 LoRA 作为可训练参数）
# =============================================================================

lora_r: 8                    # LoRA 秩 (4-16 典型值)
lora_alpha: 16               # LoRA 缩放因子 (通常为 2*r)
lora_train_mlp_head: true    # 始终为 true（Head 需要训练）

# =============================================================================
# 服务端聚合配置
# =============================================================================

# 聚合方法（聚合全局模型，与 FedLoRA 相同）
server_agg_method: fedavg    # fedavg (默认) | alignment

# 对齐度计算策略（仅当 server_agg_method=alignment）
alignment_strategy: loo_mean

# 权重转换方式（仅当 server_agg_method=alignment）
weight_transform: softmax
softmax_temperature: 0.3
lambda_smooth: 0.0

# =============================================================================
# 其他参数（保持与其他算法结构一致，部分无效）
# =============================================================================

# FedSDG 专用参数（Ditto 中忽略）
lambda1: 0.0
lambda2: 0.0
gate_penalty_type: unilateral
lr_gate: 0.01
grad_clip: 0.0

# 优化器配置
# Ditto 推荐使用 Adam
optimizer: adam

# Head 学习率（可与 Backbone 不同）
# - null: 使用主学习率 lr（默认，保持向后兼容）
# - 正数: 使用独立的 Head 学习率
lr_head: null
