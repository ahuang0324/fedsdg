# =============================================================================
# FedLoRA - 联邦低秩适应算法配置
# =============================================================================
# 
# FedLoRA 使用 LoRA (Low-Rank Adaptation) 实现参数高效的联邦学习。
# 仅传输 LoRA 参数，通信效率提升约 96%+。
#
# 使用方式:
#   python main.py algorithm=fedlora
#   python main.py algorithm=fedlora algorithm.lora_r=16
#   python main.py algorithm=fedlora algorithm.server_agg_method=alignment
#
# =============================================================================

name: fedlora

# LoRA 核心参数
lora_r: 8                      # LoRA 秩 (4-16 典型值，越小压缩率越高)
lora_alpha: 16                 # LoRA 缩放因子 (通常为 2*r)
lora_train_mlp_head: true      # 是否训练分类头

# =============================================================================
# 服务端聚合配置
# =============================================================================

# 聚合方法
server_agg_method: fedavg      # fedavg (默认) | alignment
                               # - fedavg: 均匀加权平均（标准 FedLoRA）
                               # - alignment: 基于对齐度的加权聚合（可提升收敛性）

# 对齐度计算策略（仅当 server_agg_method=alignment）
alignment_strategy: loo_mean   # loo_mean (推荐) | standard_mean
                               # - loo_mean: Leave-One-Out 平均（消除自相关偏差）
                               # - standard_mean: 标准平均

# 权重转换方式（仅当 server_agg_method=alignment）
weight_transform: softmax  # relu_normalize | softmax
                                  # - relu_normalize: ReLU + 线性归一化（默认）
                                  # - softmax: 保留负值影响，温度可调

# Softmax 温度（仅当 weight_transform=softmax）
softmax_temperature: 0.3

# 权重平滑系数：weights = (1-λ)*weights + λ*(1/M)
# 0 = 不平滑（默认），>0 = 插值到均匀分布（增加鲁棒性）
lambda_smooth: 0.0

# =============================================================================
# FedSDG 专用参数 (FedLoRA 中忽略，但保留以保持结构一致)
# =============================================================================
lambda1: 0.0
lambda2: 0.0
gate_penalty_type: unilateral
lr_gate: 0.01
grad_clip: 0.0

# 优化器配置 (覆盖 training.optimizer)
# FedLoRA 推荐使用 Adam，因为自适应学习率更适合 LoRA 低秩参数优化
optimizer: adam                # 推荐使用 Adam (适合 LoRA 微调)

# Head 学习率（可与 Backbone 不同）
# - null: 使用主学习率 lr（默认，保持向后兼容）
# - 正数: 使用独立的 Head 学习率
lr_head: null
