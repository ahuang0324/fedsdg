# =============================================================================
# FedProx (基于 FedAvg) - 联邦近端优化算法配置
# =============================================================================
# 
# FedProx 在 FedAvg 基础上添加 proximal term，防止本地模型偏离全局过远。
# 论文: "Federated Optimization in Heterogeneous Networks" (MLSys 2020)
#
# 损失函数: L = L_task + (μ/2) * ||w - w_global||²
#
# 使用方式:
#   python main.py algorithm=fedprox_avg
#   python main.py algorithm=fedprox_avg algorithm.mu=0.1
#   python main.py algorithm=fedprox_avg dataset=cifar100 training.epochs=100
#
# =============================================================================

name: fedprox_avg

# =============================================================================
# FedProx 核心参数
# =============================================================================

# proximal term 系数 (μ)
# 越大 -> 本地更新越接近全局模型
# 推荐范围: 0.001 ~ 1.0
mu: 0.01

# 优化器配置
# null 表示使用 training.optimizer 的值
# 可显式设置: algorithm.optimizer=sgd 或 algorithm.optimizer=adam
optimizer: null

# =============================================================================
# LoRA 参数 (FedProx 基于 FedAvg 不使用，保留以保持结构一致)
# =============================================================================
lora_r: 8
lora_alpha: 16
lora_train_mlp_head: true

# =============================================================================
# 服务端聚合配置
# =============================================================================

# 聚合方法
server_agg_method: fedavg      # fedavg (默认) | alignment

# 对齐度计算策略（仅当 server_agg_method=alignment）
alignment_strategy: loo_mean   # loo_mean | standard_mean

# 权重转换方式（仅当 server_agg_method=alignment）
weight_transform: relu_normalize  # relu_normalize | softmax

# Softmax 温度（仅当 weight_transform=softmax）
softmax_temperature: 1.0

# 权重平滑系数
lambda_smooth: 0.0

# =============================================================================
# FedSDG 专用参数 (FedProx 中忽略，保留以保持结构一致)
# =============================================================================
lambda1: 0.0
lambda2: 0.0
gate_penalty_type: unilateral
lr_gate: 0.01
grad_clip: 0.0
