# =============================================================================
# Local-Only (LoRA) - 本地独立训练算法配置
# =============================================================================
# 
# Local-Only LoRA 每个客户端独立训练，只使用私有 LoRA，不进行聚合。
# 相当于 FedSDG 禁用 global_LoRA，每个客户端维护自己的私有 LoRA。
#
# 使用方式:
#   python main.py algorithm=local_only
#   python main.py algorithm=local_only algorithm.lora_r=16
#
# =============================================================================

name: local_only

# LoRA 核心参数（复用 FedLoRA 配置）
lora_r: 8                      # LoRA 秩 (4-16 典型值，越小压缩率越高)
lora_alpha: 16                 # LoRA 缩放因子 (通常为 2*r)
lora_train_mlp_head: true      # 是否训练分类头

# =============================================================================
# 服务端聚合配置
# =============================================================================
# Local-Only 不进行聚合，以下参数无效，但保留以保持结构一致

server_agg_method: fedavg      # 无效（Local-Only 不聚合）
alignment_strategy: loo_mean    # 无效
weight_transform: softmax       # 无效
softmax_temperature: 0.3        # 无效
lambda_smooth: 0.0             # 无效

# =============================================================================
# FedSDG 专用参数 (Local-Only 中忽略，但保留以保持结构一致)
# =============================================================================
lambda1: 0.0
lambda2: 0.0
gate_penalty_type: unilateral
lr_gate: 0.01
grad_clip: 0.0

# 优化器配置 (覆盖 training.optimizer)
# Local-Only 推荐使用 Adam，因为自适应学习率更适合 LoRA 低秩参数优化
optimizer: adam                # 推荐使用 Adam (适合 LoRA 微调)
